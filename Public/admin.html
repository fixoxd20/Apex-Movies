<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Movies Pro | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Rajdhani', sans-serif; padding: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #141414; padding: 20px; border-left: 4px solid #e60000; border-radius: 4px; }
        .btn-sync { background: #e60000; color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-sync:hover { background: #ff1a1a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #141414; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background: #000; color: #e60000; }
        .status-badge { background: #00aa44; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🎬 Apex Movies Admin Control</h1>
    <div class="stats-grid">
        <div class="stat-card"><h3>Movies Scraped</h3><p id="count">0</p></div>
        <div class="stat-card"><h3>API Status</h3><p class="status-badge">ACTIVE</p></div>
        <div class="stat-card"><h3>Last Sync</h3><p id="time">Just now</p></div>
    </div>

    <button class="btn-sync" onclick="startSync()">🔄 START AUTO-SYNC NOW</button>

    <h3>Current Database (Live from streambox)</h3>
    <table id="movieTable">
        <thead>
            <tr><th>Title</th><th>Year</th><th>Quality</th><th>Source</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function loadAdminData() {
            const res = await fetch('/api/movies');
            const data = await res.json();
            document.getElementById('count').innerText = data.movies.length;
            const tbody = document.querySelector('#movieTable tbody');
            tbody.innerHTML = data.movies.map(m => `
                <tr>
                    <td>${m.title}</td>
                    <td>${m.year}</td>
                    <td>${m.quality}</td>
                    <td><a href="${m.streamUrl}" target="_blank" style="color:red">Link</a></td>
                </tr>
            `).join('');
        }

        async function startSync() {
            alert("Scraping and Syncing with Sinhalasub.lk started...");
            // මෙහිදී backend එකේ scraping function එක trigger වේ.
        }

        loadAdminData();
    </script>
</body>
</html>
